arazzo: 1.1.0
info:
  title: A list of workflows for a personal finance app
  summary: This Arazzo Description showcases workflows for managing personal finances in the app
  description: Contains creating categories, expenses, subscriptions (recurring payments), etc.
  version: 0.0.1
sourceDescriptions:
  - name: tapiz
    url: http://localhost:4000/api/json/open_api
    type: openapi

workflows:
  # Category workflows
  - workflowId: createUserWithCategoryAndYearlyLimit
    summary: Create user, a 'Travel' category and a yearly limit
    outputs:
      token: $steps.createUserStep.outputs.token
      category_id: $steps.createTravelCategory.outputs.category_id
    inputs:
      type: object
      additionalProperties: false
      required: ["email", "password", "limit_amount"]
      properties:
        email:
          format: email
          type: string
        password:
          type: string
          minLength: 8
        limit_amount:
          type: integer
          minimum: 0
    steps:
      - stepId: createUserStep
        description: This step creates a user
        operationId: $sourceDescriptions.tapiz.registerUser
        requestBody:
          contentType: application/vnd.api+json
          payload: >
            {
              "data": {
                "attributes": {
                  "email": "{$inputs.email}",
                  "password": "{$inputs.password}",
                  "password_confirmation": "{$inputs.password}"
                }
              }
            }
        successCriteria:
          - condition: $statusCode == 201
          - type: jsonpath
            condition: $.meta.token
            context: $response.body
        outputs:
          token: $response.body#/meta/token
      - stepId: createTravelCategory
        description: Creates a "Travel" category for the user with yearly and monthly limits
        operationId: $sourceDescriptions.tapiz.createCategory
        parameters:
          - name: Authorization
            in: header
            value: Bearer $steps.createUserStep.outputs.token
        requestBody:
          contentType: application/vnd.api+json
          payload: >
            {
              "data": {
                "attributes": {
                  "name": "Travel",
                  "description": "Travel expenses",
                  "limits": [
                    {"period": "month", "currency": "EUR", "amount": 10000},
                    {"period": "year", "currency": "EUR", "amount": 100000}
                  ]
                }
              }
            }
        successCriteria:
          - condition: $statusCode == 201
          - condition: $response.body#/data/attributes/name == 'Travel'
          - condition: $response.body#/data/attributes/description == 'Travel expenses'
        outputs:
          category_id: $response.body#/data/id
  - workflowId: deleteEmptyCategory
    summary: Creates a category for a user and deletes it
    inputs:
      additionalProperties: false
      type: object
      required: ["email"]
      properties:
        email:
          format: email
          type: string
    steps:
      - stepId: createUserAndCategory
        workflowId: createUserWithCategoryAndYearlyLimit
        parameters:
          - name: email
            value: $inputs.email
          - name: password
            value: password
          - name: password_confirmation
            value: password
        # Apparently there is no conventional way of referencing the workflow outputs
        # from the step. We'll assume all the workflow outputs are copied
      - stepId: deleteCategory
        operationPath: '{$sourceDescriptions.tapiz.url}#/paths/~1api~1json~1categories~1{id}/delete'
        parameters:
          - name: id
            in: path
            value: $steps.createUserAndCategory.outputs.category_id
          - name: Authorization
            in: header
            value: Bearer $steps.createUserAndCategory.outputs.token
        successCriteria:
          - condition: $statusCode == 200
          - condition: $response.body#/data/id == $steps.createUserAndCategory.outputs.category_id
      - stepId: fetchCategory
        operationPath: '{$sourceDescriptions.tapiz.url}#/paths/~1api~1json~1categories~1{id}/get'
        parameters:
          - name: id
            in: path
            value: $steps.createUserAndCategory.outputs.category_id
          - name: Authorization
            in: header
            value: Bearer $steps.createUserAndCategory.outputs.token
        successCriteria:
          - condition: $statusCode == 404
  # Expense workflows
  - workflowId: createExpense
    summary: Creates a one-time expense
    outputs:
      expense_id: $steps.createExpenseStep.outputs.expense_id
      token: $steps.createUserAndCategory.outputs.token
      category_id: $steps.createUserAndCategory.outputs.category_id
    inputs:
      type: object
      additionalProperties: false
      required: ["email", "expense"]
      properties:
        email:
          format: email
          type: string
        expense:
          type: object
          additionalProperties: false
          required: ["name", "amount"]
          properties:
            name:
              type: string
              minLength: 1
            amount:
              type: integer
              minimum: 1
    steps:
      - stepId: createUserAndCategory
        workflowId: createUserWithCategoryAndYearlyLimit
        parameters:
          - name: email
            value: $inputs.email
          - name: password
            value: password
          - name: password_confirmation
            value: password
      - stepId: createExpenseStep
        operationPath: '{$sourceDescriptions.tapiz.url}#/paths/~1api~1json~1expenses/post'
        requestBody:
          contentType: application/vnd.api+json
          payload:
            data:
              attributes:
                name: $inputs.expense#/name
                amount: $inputs.expense#/amount
                currency: "EUR"
                category_id: $steps.createUserAndCategory.outputs.category_id
        parameters:
          - name: Authorization
            in: header
            value: Bearer $steps.createUserAndCategory.outputs.token
        successCriteria:
          - condition: $statusCode == 201
          - condition: $response.body#/data/attributes/name == $inputs.expense#/name
          - condition: $response.body#/data/attributes/amount == $inputs.expense#/amount
        outputs:
          expense_id: $response.body#/data/id
      - stepId: queryCategoryWithExpense
        operationPath: '{$sourceDescriptions.tapiz.url}#/paths/~1api~1json~1categories~1{id}/get'
        parameters:
          - name: id
            in: path
            value: $steps.createUserAndCategory.outputs.category_id
          - name: Authorization
            in: header
            value: Bearer $steps.createUserAndCategory.outputs.token
          - name: include
            in: query
            value: expenses,active_limits
        successCriteria:
          - condition: $statusCode == 200
          - context: $response.body
            type: jsonpath
            # Check that the expense id is in the list of expenses relationships
            condition: $.data.relationships.expenses.data[?@.id == '{$steps.createExpenseStep.outputs.expense_id}']
          # Also check that for both limits, the total_spendings is equal to the expense
          - context: $response.body#/included
            type: jsonpath
            condition: $[?@.type == 'limit' && @.attributes.total_spendings == {$inputs.expense#/amount}]
  - workflowId: deleteExpense
    summary: Deletes an expense and verifies it is no longer reflected in the category and limits
    inputs:
      additionalProperties: false
      type: object
      required: ["email"]
      properties:
        email:
          type: string
          format: email
    steps:
      - stepId: createExpenseStep
        workflowId: createExpense
        parameters:
          - name: email
            value: $inputs.email
          - name: expense
            value:
              name: Some expense
              amount: 50000
              currency: "EUR"
      - stepId: deleteExpenseStep
        operationPath: '{$sourceDescriptions.tapiz.url}#/paths/~1api~1json~1expenses~1{id}/delete'
        parameters:
          - name: id
            in: path
            value: $steps.createExpenseStep.outputs.expense_id
          - name: Authorization
            in: header
            value: Bearer $steps.createExpenseStep.outputs.token
        successCriteria:
          - condition: $statusCode == 200
      - stepId: queryCategoryWithoutExpense
        operationPath: '{$sourceDescriptions.tapiz.url}#/paths/~1api~1json~1categories~1{id}/get'
        parameters:
          - name: id
            in: path
            value: $steps.createExpenseStep.outputs.category_id
          - name: Authorization
            in: header
            value: Bearer $steps.createExpenseStep.outputs.token
          - name: include
            in: query
            value: active_limits
        successCriteria:
          - condition: $statusCode == 200
          # Since we deleted the expense there shouldn't be any spending
          - context: $response.body#/included
            type: jsonpath
            condition: $[?@.type == 'limit' && @.attributes.total_spendings == 0]

  # RecurringPayment workflows
  - workflowId: createRecurringPayment
    summary: Creates a recurring payment with an associated expense
    inputs:
      additionalProperties: false
      type: object
      required: ["email", "recurring_payment"]
      properties:
        email:
          type: string
          format: email
        recurring_payment:
          type: object
          additionalProperties: false
          required: ["name", "amount", "period"]
          properties:
            name:
              type: string
            amount:
              type: integer
              minimum: 1
            period:
              enum: ["month", "year"]
    steps:
      - stepId: createUserAndCategoryStep
        workflowId: createUserWithCategoryAndYearlyLimit
        parameters:
          - name: email
            value: $inputs.email
          - name: password
            value: password
          - name: password_confirmation
            value: password
      - stepId: createRecurringPaymentStep
        operationId: $sourceDescriptions.tapiz.createRecurringPayment
        requestBody:
          contentType: application/vnd.api+json
          payload:
            data:
              attributes:
                category_id: $steps.createUserAndCategoryStep.outputs.category_id
                create_expense: true
                amount: $inputs.recurring_payment#/amount
                period: $inputs.recurring_payment#/period
                name: $inputs.recurring_payment#/name
                currency: "EUR"
        parameters:
          - name: Authorization
            in: header
            value: Bearer $steps.createUserAndCategoryStep.outputs.token
        successCriteria:
          - condition: $statusCode == 201
        outputs:
          recurring_payment_id: $response.body#/data/id
      - stepId: queryCategoryWithRecurringPaymentStep
        operationId: $sourceDescriptions.tapiz.getCategory
        parameters:
          - name: id
            in: path
            value: $steps.createUserAndCategoryStep.outputs.category_id
          - name: include
            in: query
            value: recurring_payments,expenses
          - name: Authorization
            in: header
            value: Bearer $steps.createUserAndCategoryStep.outputs.token
        successCriteria:
          - condition: $statusCode == 200
          - context: $request.body
            type: jsonpath
            condition: $
          # There is a recurring payment
          - context: $response.body#/included
            type: jsonpath
            condition: $[?@.type == 'recurring_payment']
          # There is an expense
          - context: $response.body#/included
            type: jsonpath
            condition: $[?@.type == 'expense']
          - context: $response.body
            type: jsonpath
            # The recurring payment id is the one we just created
            condition: $.data.relationships.recurring_payments.data[?@.id == '{$steps.createRecurringPaymentStep.outputs.recurring_payment_id}']

